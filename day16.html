<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 16 – Advanced Data Visualization & Client-Ready Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body
    class="bg-white text-black dark:bg-zinc-950 dark:text-white font-sans min-h-screen"
  >
    <div class="max-w-screen-2xl mx-auto px-6 py-12">
      <h1
        class="text-5xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        Day 16: Advanced Data Visualization & Client-Ready Analytics
      </h1>

      <!-- Minimal Back Button -->
      <a
        href="index.html"
        class="inline-flex items-center gap-2.5 px-5 py-2.5 mb-12 text-sm font-medium text-zinc-400 hover:text-white transition-all group mx-auto block w-fit"
      >
        <i
          class="fa-solid fa-arrow-left text-base transition-transform group-hover:-translate-x-0.5"
        ></i>
        <span>Back to Portfolio</span>
      </a>

      <!-- 1. Marketing Channel Performance -->
      <section class="mb-24">
        <h2 class="text-3xl font-semibold mb-12 text-center">
          1. Marketing Channel Performance
        </h2>

        <div class="max-w-7xl mx-auto">
          <div class="flex flex-wrap gap-4 mb-10 justify-center">
            <select
              id="quarter-filter"
              onchange="updateChart()"
              class="bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-white/20 rounded-2xl px-6 py-3 focus:outline-none focus:border-blue-500"
            >
              <option value="all">All Quarters</option>
              <option value="Q1">Q1 2026</option>
              <option value="Q2">Q2 2026</option>
              <option value="Q3">Q3 2026</option>
            </select>

            <button
              onclick="exportReport()"
              class="px-8 py-3 bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-white/20 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition flex items-center gap-3"
            >
              <i class="fa-solid fa-download"></i> Export Report
            </button>
          </div>

          <div
            class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-white/10 rounded-3xl p-10"
          >
            <canvas id="performanceChart" class="w-full h-96"></canvas>
          </div>

          <div
            class="mt-8 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-white/10 rounded-3xl overflow-hidden"
          >
            <table class="w-full">
              <thead>
                <tr class="border-b border-zinc-200 dark:border-white/10">
                  <th class="text-left p-6 font-medium">Channel</th>
                  <th class="text-right p-6 font-medium">Q1</th>
                  <th class="text-right p-6 font-medium">Q2</th>
                  <th class="text-right p-6 font-medium">Q3</th>
                  <th class="text-right p-6 font-medium">Total</th>
                </tr>
              </thead>
              <tbody
                id="data-table"
                class="divide-y divide-zinc-200 dark:divide-white/10"
              ></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- 2. Multi-View Analytics Engine -->
      <section class="mb-24">
        <h2 class="text-3xl font-semibold mb-12 text-center">
          2. Multi-View Analytics Engine
        </h2>

        <div class="max-w-7xl mx-auto">
          <div class="flex justify-center mb-10">
            <div
              class="inline-flex bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-white/10 rounded-3xl p-1"
            >
              <button
                onclick="switchView(0)"
                id="view-revenue"
                class="px-8 py-3.5 rounded-3xl font-semibold transition-all"
              >
                Revenue View
              </button>
              <button
                onclick="switchView(1)"
                id="view-efficiency"
                class="px-8 py-3.5 rounded-3xl font-semibold transition-all"
              >
                Efficiency View
              </button>
              <button
                onclick="switchView(2)"
                id="view-insight"
                class="px-8 py-3.5 rounded-3xl font-semibold transition-all"
              >
                Insight View (ROI vs Volume)
              </button>
            </div>
          </div>

          <div
            class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-white/10 rounded-3xl p-10"
          >
            <canvas id="advancedChart" class="w-full h-96"></canvas>
          </div>
        </div>
      </section>
    </div>

    <script>
      let performanceChart, mainChart;
      let currentView = 0;

      const fullData = {
        channels: [
          "Google Ads",
          "Facebook",
          "Instagram",
          "LinkedIn",
          "Email",
          "TikTok",
        ],
        revenue: {
          Q1: [12400, 9800, 15600, 6700, 8900, 4500],
          Q2: [18700, 14200, 21300, 9800, 12400, 7800],
          Q3: [23100, 18900, 26700, 13400, 15600, 11200],
        },
        roi: [280, 190, 340, 410, 520, 230],
        cpa: [42, 68, 31, 27, 19, 55],
      };

      // ==================== PERFORMANCE CHART ====================
      const channelData = {
        labels: fullData.channels,
        datasets: [
          {
            label: "Q1 2026",
            data: fullData.revenue.Q1,
            backgroundColor: "#3b82f6",
          },
          {
            label: "Q2 2026",
            data: fullData.revenue.Q2,
            backgroundColor: "#8b5cf6",
          },
          {
            label: "Q3 2026",
            data: fullData.revenue.Q3,
            backgroundColor: "#ec4899",
          },
        ],
      };

      function createPerformanceChart() {
        const ctx = document.getElementById("performanceChart");
        if (performanceChart) performanceChart.destroy();
        performanceChart = new Chart(ctx, {
          type: "bar",
          data: channelData,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: "top" } },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: (v) => "$" + v.toLocaleString() },
              },
            },
          },
        });
      }

      function updateTable() {
        const tbody = document.getElementById("data-table");
        let html = "";
        fullData.channels.forEach((channel, i) => {
          const q1 = fullData.revenue.Q1[i];
          const q2 = fullData.revenue.Q2[i];
          const q3 = fullData.revenue.Q3[i];
          const total = q1 + q2 + q3;
          html += `<tr class="hover:bg-zinc-50 dark:hover:bg-zinc-800 transition">
          <td class="p-6 font-medium">${channel}</td>
          <td class="p-6 text-right">$${q1.toLocaleString()}</td>
          <td class="p-6 text-right">$${q2.toLocaleString()}</td>
          <td class="p-6 text-right">$${q3.toLocaleString()}</td>
          <td class="p-6 text-right font-semibold">$${total.toLocaleString()}</td>
        </tr>`;
        });
        tbody.innerHTML = html;
      }

      function updateChart() {
        createPerformanceChart();
      }
      function exportReport() {
        alert("✅ Report exported as PDF (Production version would use jsPDF)");
      }

      // ==================== ADVANCED MULTI-VIEW CHART ====================
      function createAdvancedChart() {
        const ctx = document.getElementById("advancedChart");
        if (mainChart) mainChart.destroy();

        if (currentView === 0) {
          // Revenue View
          mainChart = new Chart(ctx, {
            type: "bar",
            data: channelData,
            options: { responsive: true, maintainAspectRatio: false },
          });
        } else if (currentView === 1) {
          // Efficiency View - ROI Line
          mainChart = new Chart(ctx, {
            type: "line",
            data: {
              labels: fullData.channels,
              datasets: [
                {
                  label: "ROI %",
                  data: fullData.roi,
                  borderColor: "#10b981",
                  borderWidth: 5,
                  tension: 0.4,
                  pointRadius: 6,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: { beginAtZero: true, ticks: { callback: (v) => v + "%" } },
              },
            },
          });
        } else {
          // Insight View - Scatter Plot (ROI vs Volume)
          const totalRevenue = fullData.channels.map(
            (_, i) =>
              fullData.revenue.Q1[i] +
              fullData.revenue.Q2[i] +
              fullData.revenue.Q3[i],
          );
          mainChart = new Chart(ctx, {
            type: "bubble",
            data: {
              datasets: [
                {
                  label: "Channels",
                  data: fullData.channels.map((channel, i) => ({
                    x: totalRevenue[i] / 1000,
                    y: fullData.roi[i],
                    r: Math.sqrt(totalRevenue[i] / 800),
                  })),
                  backgroundColor: "#a855f7",
                  borderColor: "#fff",
                  borderWidth: 3,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  title: { display: true, text: "Total Revenue Volume ($K)" },
                },
                y: { title: { display: true, text: "ROI %" } },
              },
            },
          });
        }
      }

      function switchView(view) {
        currentView = view;
        ["view-revenue", "view-efficiency", "view-insight"].forEach((id, i) => {
          const el = document.getElementById(id);
          el.classList.toggle("bg-zinc-900", i === view);
          el.classList.toggle("text-white", i === view);
        });
        createAdvancedChart();
      }

      // Initialize everything
      window.onload = function () {
        createPerformanceChart();
        updateTable();
        createAdvancedChart();
      };
    </script>
  </body>
</html>
