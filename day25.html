<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 25 – Premium Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", system_ui, sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
      }
      .kpi-value {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -2px;
        font-feature-settings: "tnum";
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-screen-2xl mx-auto px-6 py-12">
      <!-- === BACK TO PORTFOLIO + THEME TOGGLE (exactly as requested) === -->
      <div class="flex justify-between items-center mb-12">
        <a
          href="index.html"
          class="inline-flex items-center gap-2.5 px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white transition-all group"
        >
          <i
            class="fa-solid fa-arrow-left text-base transition-transform group-hover:-translate-x-0.5"
          ></i>
          <span>Back to Portfolio</span>
        </a>

        <button
          onclick="toggleTheme()"
          class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition"
        >
          <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
        </button>
      </div>

      <h1
        class="text-5xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        Day 25: Premium Analytics Dashboard
      </h1>

      <!-- Dashboard content (unchanged from your approved version) -->
      <div
        class="max-w-screen-2xl mx-auto flex h-[calc(100vh-180px)] overflow-hidden"
      >
        <!-- Sidebar -->
        <div class="w-72 bg-white/5 border-r border-white/10 flex flex-col">
          <div class="p-6 flex items-center gap-3 border-b border-white/10">
            <div
              class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center text-white font-bold text-xl"
            >
              VC
            </div>
            <h1 class="text-2xl font-semibold">Vibe Analytics</h1>
          </div>
          <div class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a
              href="#"
              class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-white/10 text-white"
            >
              <i class="fa-solid fa-house w-5"></i
              ><span class="font-medium">Dashboard</span>
            </a>
            <a
              href="#"
              class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-white/10 transition-all"
            >
              <i class="fa-solid fa-chart-bar w-5"></i
              ><span class="font-medium">Analytics</span>
            </a>
            <a
              href="#"
              class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-white/10 transition-all"
            >
              <i class="fa-solid fa-users w-5"></i
              ><span class="font-medium">Team</span>
            </a>
          </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
          <!-- Top Nav -->
          <div
            class="h-16 border-b border-white/10 bg-white/5 glass flex items-center px-8 justify-between z-30"
          >
            <input
              id="search-input"
              type="text"
              placeholder="Search metrics or events..."
              class="glass bg-white/10 border border-white/20 rounded-3xl px-6 py-3 w-96 focus:outline-none focus:border-cyan-400 transition text-sm"
            />
            <div class="flex bg-white/5 rounded-3xl p-1 text-sm font-medium">
              <button
                onclick="setPeriod(7)"
                id="period-7"
                class="period-btn px-6 py-2 rounded-3xl"
              >
                7d
              </button>
              <button
                onclick="setPeriod(30)"
                id="period-30"
                class="period-btn px-6 py-2 rounded-3xl active"
              >
                30d
              </button>
              <button
                onclick="setPeriod(90)"
                id="period-90"
                class="period-btn px-6 py-2 rounded-3xl"
              >
                90d
              </button>
            </div>
            <button
              onclick="simulateLiveUpdate()"
              class="flex items-center gap-2 text-cyan-400 hover:text-cyan-300 transition"
            >
              <i class="fa-solid fa-sync"></i>
              <span class="text-sm font-medium">Live</span>
            </button>
          </div>

          <!-- Scrollable Body -->
          <div class="flex-1 overflow-auto p-8 space-y-8">
            <!-- KPI Grid -->
            <div
              class="grid grid-cols-2 lg:grid-cols-4 gap-6"
              id="kpi-grid"
            ></div>

            <!-- Side-by-Side Charts -->
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
              <div
                class="glass border border-white/10 rounded-3xl p-6 hover:-translate-y-1 transition-all"
              >
                <h3 class="font-semibold mb-4 text-cyan-300">Revenue Trend</h3>
                <div class="h-[340px]">
                  <canvas id="lineChart" class="h-full w-full"></canvas>
                </div>
              </div>
              <div
                class="glass border border-white/10 rounded-3xl p-6 hover:-translate-y-1 transition-all"
              >
                <h3 class="font-semibold mb-4 text-purple-300">
                  Channel Performance
                </h3>
                <div class="h-[340px]">
                  <canvas id="barChart" class="h-full w-full"></canvas>
                </div>
              </div>
            </div>

            <!-- Bottom Row -->
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
              <div class="glass border border-white/10 rounded-3xl p-6">
                <h3 class="font-semibold mb-6">Recent Activity Log</h3>
                <table id="data-table" class="w-full text-sm"></table>
              </div>
              <div class="glass border border-white/10 rounded-3xl p-6">
                <h3 class="font-semibold mb-6 flex items-center gap-2">
                  <span class="relative flex h-3 w-3"
                    ><span
                      class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"
                    ></span
                    ><span
                      class="relative inline-flex rounded-full h-3 w-3 bg-cyan-400"
                    ></span
                  ></span>
                  Live Feed
                </h3>
                <div id="feed" class="space-y-4"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toast-container"
      class="fixed bottom-6 right-6 flex flex-col gap-3 z-[100]"
    ></div>

    <script>
      // ==================== SINGLE SOURCE OF TRUTH ====================
      let appState = {
        kpis: [
          {
            label: "Revenue",
            value: 124800,
            prefix: "$",
            delta: "+18%",
            color: "#22d3ee",
          },
          {
            label: "Active Users",
            value: 8743,
            delta: "+12%",
            color: "#a78bfa",
          },
          {
            label: "Conv. Rate",
            value: 12.8,
            suffix: "%",
            delta: "+2.4%",
            color: "#34d399",
          },
          { label: "Sessions", value: 45290, delta: "+31%", color: "#fbbf24" },
        ],
        labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
        revenue: [4200, 6800, 5900, 8100, 7200, 9400, 8800],
        sessions: [820, 1340, 980, 1620, 1410, 1890, 1720],
        table: [
          {
            event: "User signup",
            user: "sarah.dev",
            time: "2m ago",
            status: "ok",
          },
          {
            event: "Payment processed",
            user: "mario.c",
            time: "11m ago",
            status: "ok",
          },
          {
            event: "Failed login",
            user: "guest123",
            time: "27m ago",
            status: "warn",
          },
        ],
        feed: [
          {
            user: "sarah.dev",
            detail: "signed up via email",
            time: "just now",
            type: "ok",
          },
          {
            user: "mario.c",
            detail: "processed $480 payment",
            time: "11m ago",
            type: "ok",
          },
        ],
        originalRevenue: 124800,
      };

      let lineChart, barChart;
      let currentPeriod = 30;

      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
        const icon = document.getElementById("theme-icon");
        icon.classList.toggle("fa-moon");
        icon.classList.toggle("fa-sun");
      }

      function showToast(type, message) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `flex items-center gap-4 px-6 py-4 rounded-3xl shadow-2xl min-w-[320px] transform transition-all duration-300 translate-y-8 opacity-0 ${type === "success" ? "bg-emerald-600" : "bg-cyan-600"} text-white`;
        toast.innerHTML = `<i class="fa-solid fa-check-circle text-2xl"></i><span class="font-medium">${message}</span>`;
        container.appendChild(toast);
        setTimeout(
          () => toast.classList.remove("translate-y-8", "opacity-0"),
          10,
        );
        setTimeout(() => {
          toast.classList.add("translate-y-8", "opacity-0");
          setTimeout(() => toast.remove(), 300);
        }, 3400);
      }

      function animateCounter(el, target) {
        let start = 0;
        const duration = 1400;
        const startTime = performance.now();
        function update(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          start = eased * target;
          el.textContent =
            target % 1 === 0
              ? Math.floor(start).toLocaleString()
              : start.toFixed(1);
          if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
      }

      function renderKPIs() {
        const grid = document.getElementById("kpi-grid");
        grid.innerHTML = appState.kpis
          .map(
            (k) => `
        <div class="glass border border-white/10 rounded-3xl p-8 hover:-translate-y-1 transition-all">
          <div class="flex justify-between"><span class="text-zinc-400 text-sm">${k.label}</span><span class="text-cyan-400 text-sm">${k.delta}</span></div>
          <div class="kpi-value mt-2 flex items-baseline gap-1">
            <span class="text-3xl">${k.prefix || ""}</span>
            <span class="number">${k.value.toLocaleString()}</span>
            <span>${k.suffix || ""}</span>
          </div>
        </div>
      `,
          )
          .join("");
        setTimeout(() => {
          document
            .querySelectorAll(".number")
            .forEach((el, i) => animateCounter(el, appState.kpis[i].value));
        }, 200);
      }

      function initCharts() {
        lineChart = new Chart(document.getElementById("lineChart"), {
          type: "line",
          data: {
            labels: appState.labels,
            datasets: [
              {
                data: appState.revenue,
                borderColor: "#22d3ee",
                tension: 0.45,
                borderWidth: 3,
                pointRadius: 0,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
          },
        });
        barChart = new Chart(document.getElementById("barChart"), {
          type: "bar",
          data: {
            labels: appState.labels,
            datasets: [
              {
                data: appState.sessions,
                backgroundColor: "#a78bfa",
                borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
          },
        });
      }

      function updateCharts() {
        const m = currentPeriod / 30;
        lineChart.data.datasets[0].data = appState.revenue.map((v) =>
          Math.round(v * m),
        );
        barChart.data.datasets[0].data = appState.sessions.map((v) =>
          Math.round(v * m),
        );
        lineChart.update();
        barChart.update();
      }

      function setPeriod(d, btn) {
        currentPeriod = d;
        document
          .querySelectorAll(".period-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        updateCharts();
      }

      function renderTable() {
        const tbody = document.getElementById("data-table");
        tbody.innerHTML = appState.table
          .map(
            (r) => `
        <tr class="border-b border-white/10 hover:bg-white/5">
          <td class="p-4">${r.event}</td>
          <td class="p-4 text-zinc-400">${r.user}</td>
          <td class="p-4 text-zinc-400">${r.time}</td>
          <td class="p-4"><span class="px-3 py-1 text-xs rounded-2xl ${r.status === "ok" ? "bg-cyan-400/10 text-cyan-400" : "bg-amber-400/10 text-amber-400"}">${r.status}</span></td>
        </tr>
      `,
          )
          .join("");
      }

      function renderFeed() {
        const feed = document.getElementById("feed");
        feed.innerHTML = appState.feed
          .map(
            (f) => `
        <div class="flex gap-3 text-sm">
          <span class="text-cyan-400">•</span>
          <div><span class="font-medium">${f.user}</span> ${f.detail} <span class="text-zinc-400">${f.time}</span></div>
        </div>
      `,
          )
          .join("");
      }

      function simulateLiveUpdate() {
        const revenueKPI = appState.kpis[0];
        const increase = Math.floor(Math.random() * 1800) + 600;
        revenueKPI.value += increase;
        const percentIncrease = (
          ((revenueKPI.value - appState.originalRevenue) /
            appState.originalRevenue) *
          100
        ).toFixed(0);
        revenueKPI.delta = `+${percentIncrease}%`;
        renderKPIs();
        showToast(
          "success",
          `Revenue +$${increase.toLocaleString()} • Live update`,
        );
      }

      window.onload = function () {
        renderKPIs();
        initCharts();
        renderTable();
        renderFeed();
        setInterval(() => {
          if (Math.random() > 0.65) simulateLiveUpdate();
        }, 4200);
      };
    </script>
  </body>
</html>
