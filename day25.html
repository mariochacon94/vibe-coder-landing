<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 25 – Advanced Multi-Step Wizards & Accessibility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      .hero-bg {
        background: linear-gradient(135deg, #0f766e 0%, #164e63 100%);
      }
      .glass {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(16px);
      }

      /* High-contrast dropdown styling */
      select {
        color: #ffffff !important;
        font-weight: 500;
      }
      select option {
        background: #164e63;
        color: #ffffff;
        padding: 12px 16px;
      }
      select:focus {
        border-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white font-sans min-h-screen">
    <div class="max-w-screen-2xl mx-auto px-6 py-12">
      <h1
        class="text-5xl font-bold text-center mb-16 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        Day 25: Multi-Step Wizards + Progressive Saving + Accessibility
      </h1>

      <!-- Progress Bar -->
      <div
        class="max-w-2xl mx-auto mb-12"
        role="progressbar"
        aria-label="Wizard progress"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="33"
      >
        <div class="flex justify-between text-sm font-medium mb-3 px-1">
          <div
            id="step-1-label"
            class="step-label text-emerald-400"
            aria-current="step"
          >
            Step 1: Personal Info
          </div>
          <div id="step-2-label" class="step-label">
            Step 2: Project Details
          </div>
          <div id="step-3-label" class="step-label">Step 3: Preferences</div>
        </div>
        <div class="h-3 bg-white/10 rounded-3xl overflow-hidden">
          <div
            id="progress-bar"
            class="h-3 bg-gradient-to-r from-emerald-400 to-teal-400 w-1/3 transition-all duration-500"
          ></div>
        </div>
      </div>

      <!-- Wizard -->
      <div
        id="wizard-container"
        class="max-w-2xl mx-auto bg-white/10 backdrop-blur-3xl rounded-3xl p-10"
        role="region"
        aria-labelledby="wizard-title"
      >
        <h2 id="wizard-title" class="sr-only">Multi-step wizard</h2>
        <div id="wizard-content" class="min-h-[420px]"></div>

        <div class="flex justify-between mt-10">
          <button
            onclick="prevStep()"
            id="btn-back"
            class="px-8 py-4 border border-white/30 rounded-3xl font-medium flex items-center gap-2 hover:bg-white/10 transition"
            aria-label="Go to previous step"
          >
            <i class="fa-solid fa-arrow-left"></i> Back
          </button>
          <button
            onclick="nextStep()"
            id="btn-next"
            class="px-10 py-4 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center gap-3 hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Next <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div
      id="success-message"
      role="dialog"
      aria-modal="true"
      aria-labelledby="success-title"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"
    >
      <div
        class="bg-white/95 dark:bg-zinc-900/95 backdrop-blur-3xl rounded-3xl p-10 max-w-md text-center"
      >
        <div
          class="w-20 h-20 bg-emerald-400 text-white rounded-3xl flex items-center justify-center mb-6 text-5xl mx-auto"
        >
          ✅
        </div>
        <h3 id="success-title" class="text-3xl font-bold mb-2">
          Project Brief Submitted!
        </h3>
        <p class="text-teal-700 dark:text-teal-300 mb-8">
          Thank you! Your information has been saved and we’ll get back to you
          shortly.
        </p>
        <button
          onclick="hideSuccess()"
          class="px-8 py-3 border border-teal-700 rounded-3xl font-medium hover:bg-teal-700 hover:text-white transition"
        >
          Close
        </button>
      </div>
    </div>

    <script>
      let formData = JSON.parse(localStorage.getItem("day25WizardData")) || {
        currentStep: 1,
        name: "",
        email: "",
        projectType: "",
        budget: "",
        timeline: "",
        notes: "",
      };

      function saveProgress() {
        localStorage.setItem("day25WizardData", JSON.stringify(formData));
      }

      const steps = {
        1: () => `
        <h2 class="text-3xl font-semibold mb-8">Tell us about yourself</h2>
        <div class="space-y-8">
          <div>
            <label for="name" class="block text-sm mb-2">Full Name <span class="text-red-400">*</span></label>
            <input type="text" id="name" value="${formData.name}" required
              class="w-full px-6 py-4 rounded-3xl bg-white/10 border border-white/30 focus:border-emerald-400 text-white"
              oninput="formData.name = this.value; saveProgress(); validateStep()">
            <div id="name-error" class="text-red-400 text-xs mt-1 hidden">Please enter your name</div>
          </div>
          <div>
            <label for="email" class="block text-sm mb-2">Email Address <span class="text-red-400">*</span></label>
            <input type="email" id="email" value="${formData.email}" required
              class="w-full px-6 py-4 rounded-3xl bg-white/10 border border-white/30 focus:border-emerald-400 text-white"
              oninput="formData.email = this.value; saveProgress(); validateStep()">
            <div id="email-error" class="text-red-400 text-xs mt-1 hidden">Please enter a valid email</div>
          </div>
        </div>`,

        2: () => `
        <h2 class="text-3xl font-semibold mb-8">Project Details</h2>
        <div class="space-y-8">
          <div>
            <label for="projectType" class="block text-sm mb-2">Project Type <span class="text-red-400">*</span></label>
            <select id="projectType" required class="w-full px-6 py-4 rounded-3xl bg-white/10 border border-white/30 text-white focus:border-emerald-400"
              onchange="formData.projectType = this.value; saveProgress(); validateStep()">
              <option value="">Select one...</option>
              <option value="Website" ${formData.projectType === "Website" ? "selected" : ""}>Website</option>
              <option value="Dashboard" ${formData.projectType === "Dashboard" ? "selected" : ""}>Dashboard</option>
              <option value="Mobile App" ${formData.projectType === "Mobile App" ? "selected" : ""}>Mobile App</option>
            </select>
            <div id="projectType-error" class="text-red-400 text-xs mt-1 hidden">Please select a project type</div>
          </div>
          <div>
            <label for="budget" class="block text-sm mb-2">Budget Range</label>
            <input type="text" id="budget" value="${formData.budget}"
              class="w-full px-6 py-4 rounded-3xl bg-white/10 border border-white/30 focus:border-emerald-400 text-white"
              oninput="formData.budget = this.value; saveProgress(); validateStep()">
          </div>
        </div>`,

        3: () => `
        <h2 class="text-3xl font-semibold mb-8">Final Preferences</h2>
        <div class="space-y-8">
          <div>
            <label for="timeline" class="block text-sm mb-2">Timeline <span class="text-red-400">*</span></label>
            <select id="timeline" required class="w-full px-6 py-4 rounded-3xl bg-white/10 border border-white/30 text-white focus:border-emerald-400"
              onchange="formData.timeline = this.value; saveProgress(); validateStep()">
              <option value="">Choose timeline...</option>
              <option value="2 weeks" ${formData.timeline === "2 weeks" ? "selected" : ""}>Within 2 weeks</option>
              <option value="1 month" ${formData.timeline === "1 month" ? "selected" : ""}>Within 1 month</option>
              <option value="2 months" ${formData.timeline === "2 months" ? "selected" : ""}>Within 2 months</option>
            </select>
            <div id="timeline-error" class="text-red-400 text-xs mt-1 hidden">Please select a timeline</div>
          </div>
          <div>
            <label for="notes" class="block text-sm mb-2">Additional Notes</label>
            <textarea id="notes" rows="5" 
              class="w-full px-6 py-4 rounded-3xl bg-white/10 border border-white/30 text-white resize-y"
              oninput="formData.notes = this.value; saveProgress()">${formData.notes}</textarea>
          </div>
        </div>`,
      };

      function renderStep() {
        document.getElementById("wizard-content").innerHTML =
          steps[formData.currentStep]();
        updateProgressBar();
        updateNavButtons();
        validateStep();
      }

      function updateProgressBar() {
        const progress = ((formData.currentStep - 1) / 3) * 100;
        document.getElementById("progress-bar").style.width = `${progress}%`;
        document
          .getElementById("progress-bar")
          .parentElement.setAttribute("aria-valuenow", Math.round(progress));
      }

      function updateNavButtons() {
        document.getElementById("btn-back").disabled =
          formData.currentStep === 1;
      }

      function validateStep() {
        let valid = true;
        if (formData.currentStep === 1) {
          valid = formData.name.trim() !== "" && formData.email.trim() !== "";
          document
            .getElementById("name-error")
            .classList.toggle("hidden", formData.name.trim() !== "");
          document
            .getElementById("email-error")
            .classList.toggle("hidden", formData.email.trim() !== "");
        } else if (formData.currentStep === 2) {
          valid = formData.projectType !== "";
          document
            .getElementById("projectType-error")
            .classList.toggle("hidden", formData.projectType !== "");
        } else if (formData.currentStep === 3) {
          valid = formData.timeline !== "";
          document
            .getElementById("timeline-error")
            .classList.toggle("hidden", formData.timeline !== "");
        }
        document.getElementById("btn-next").disabled = !valid;
        return valid;
      }

      function nextStep() {
        if (!validateStep()) return;
        if (formData.currentStep < 3) {
          formData.currentStep++;
          renderStep();
          saveProgress();
        } else {
          showSuccess();
        }
      }

      function prevStep() {
        if (formData.currentStep > 1) {
          formData.currentStep--;
          renderStep();
          saveProgress();
        }
      }

      function showSuccess() {
        const modal = document.getElementById("success-message");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function hideSuccess() {
        const modal = document.getElementById("success-message");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        formData = {
          currentStep: 1,
          name: "",
          email: "",
          projectType: "",
          budget: "",
          timeline: "",
          notes: "",
        };
        localStorage.removeItem("day25WizardData");
        renderStep();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") nextStep();
        if (e.key === "ArrowLeft") prevStep();
      });

      window.onload = () => {
        renderStep();
      };
    </script>
  </body>
</html>
