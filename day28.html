<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 28 – Advanced Data Tables with Real-time Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Syne", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .font-display {
        font-family: "Syne", sans-serif;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }
      .animate-pulse-dot {
        animation: pulse-dot 2s infinite;
      }
      @keyframes flash-in {
        0% {
          background-color: rgba(124, 109, 250, 0.15);
          border-color: #7c6dfa;
        }
        100% {
          background-color: rgba(255, 255, 255, 0.05);
          border-color: rgba(255, 255, 255, 0.07);
        }
      }
      .flash {
        animation: flash-in 0.6s ease forwards;
      }
      @keyframes slide-up {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .toast-show {
        animation: slide-up 0.3s ease forwards;
      }
      .toast-hide {
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.3s;
      }
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body
    class="bg-zinc-950 text-zinc-100 font-sans min-h-screen overflow-hidden"
  >
    <!-- Back to Portfolio Button -->
    <a
      href="index.html"
      class="inline-flex items-center gap-2.5 px-5 py-2.5 mb-8 text-sm font-medium text-zinc-400 hover:text-white transition-all group mx-auto block w-fit"
    >
      <i
        class="fa-solid fa-arrow-left text-base transition-transform group-hover:-translate-x-0.5"
      ></i>
      <span>Back to Portfolio</span>
    </a>

    <div class="flex h-screen w-full">
      <!-- Sidebar -->
      <aside
        class="w-56 flex-shrink-0 bg-zinc-900 border-r border-white/[0.07] flex flex-col p-4 gap-1"
      >
        <div class="flex items-center gap-3 px-2 py-1 mb-5">
          <div
            class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-400 flex items-center justify-center text-lg flex-shrink-0"
          >
            📦
          </div>
          <span class="font-display font-bold text-lg tracking-tight"
            >VibeStore</span
          >
        </div>
        <button
          id="nav-dashboard"
          onclick="navigateTo('dashboard')"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-400 hover:bg-white/10 hover:text-zinc-100 transition-all text-left w-full"
        >
          <i class="fa-solid fa-gauge-high w-4 text-center"></i> Dashboard
        </button>
        <button
          id="nav-table"
          onclick="navigateTo('table')"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-400 hover:bg-white/10 hover:text-zinc-100 transition-all text-left w-full"
        >
          <i class="fa-solid fa-table w-4 text-center"></i> Data Table
        </button>
      </aside>
      <!-- Main -->
      <main class="flex-1 overflow-y-auto p-8" id="main"></main>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="toast-hide fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-zinc-800 border border-white/10 rounded-xl px-4 py-3 text-sm max-w-xs pointer-events-none"
    >
      <i class="fa-solid fa-bolt text-emerald-400 flex-shrink-0"></i>
      <span id="toast-text" class="text-zinc-100 leading-snug"></span>
    </div>

    <!-- Merge Dialog -->
    <div
      id="merge-dialog"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]"
    >
      <div
        class="bg-white/95 dark:bg-zinc-900/95 backdrop-blur-3xl rounded-3xl p-8 max-w-md w-full mx-4"
      >
        <h3 class="font-display text-xl font-bold mb-2">Conflict Detected</h3>
        <p class="text-zinc-500 mb-6">
          Another user edited this row while you were working. How would you
          like to proceed?
        </p>
        <div class="flex gap-3">
          <button
            onclick="mergeConflict('override')"
            class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-medium transition"
          >
            Override with my changes
          </button>
          <button
            onclick="mergeConflict('merge')"
            class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-medium transition"
          >
            Merge changes
          </button>
        </div>
      </div>
    </div>

    <script>
      var store = {
        user: { name: "Mario", role: "admin" },
        tableData: [
          {
            id: 1,
            name: "Shine On Website",
            type: "Website",
            status: "live",
            progress: 100,
            lastEditedBy: "Sarah",
            lockedBy: null,
            date: "2026-05-12",
          },
          {
            id: 2,
            name: "Vibe Coder Portfolio",
            type: "Portfolio",
            status: "in-progress",
            progress: 85,
            lastEditedBy: "You",
            lockedBy: null,
            date: "2026-05-11",
          },
          {
            id: 3,
            name: "Mobile App Redesign",
            type: "App",
            status: "in-review",
            progress: 62,
            lastEditedBy: "Alex",
            lockedBy: null,
            date: "2026-05-10",
          },
        ],
        presence: ["Sarah", "Alex", "You"],
      };
      var currentPage = "dashboard";

      function navigateTo(page) {
        currentPage = page;
        document.querySelectorAll(".nav-item").forEach((el) => {
          el.classList.remove("bg-white/10", "text-zinc-100");
          el.classList.add("text-zinc-400");
        });
        const active = document.getElementById("nav-" + page);
        if (active) {
          active.classList.add("bg-white/10", "text-zinc-100");
          active.classList.remove("text-zinc-400");
        }
        render();
      }

      function render() {
        const m = document.getElementById("main");
        if (currentPage === "dashboard") m.innerHTML = renderDashboard();
        else if (currentPage === "table") m.innerHTML = renderTable();
      }

      function renderDashboard() {
        const pills = store.presence
          .map(
            (n) => `
          <div class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse-dot inline-block"></span>${n}
          </div>`,
          )
          .join("");
        const items = store.tableData
          .map(
            (p) => `
          <div class="flex items-center gap-4 bg-white/[0.05] border border-white/[0.07] rounded-xl px-4 py-3.5 hover:bg-white/[0.08] transition-all" id="act-${p.id}">
            <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-sm bg-emerald-500/10 text-emerald-400">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate">${p.name}</p>
              <p class="text-xs text-zinc-500 mt-0.5">Last edited by <span class="text-emerald-400">${p.lastEditedBy}</span></p>
            </div>
            <div class="flex items-center gap-2.5 flex-shrink-0">
              <div class="w-16 h-1 bg-zinc-800 rounded-full overflow-hidden">
                <div class="h-full bg-violet-500 rounded-full transition-all duration-700" style="width:${p.progress}%"></div>
              </div>
              <span class="font-display text-xs font-semibold text-violet-300 w-8 text-right">${p.progress}%</span>
            </div>
          </div>`,
          )
          .join("");
        return `
          <div class="mb-7">
            <h1 class="font-display text-2xl font-bold tracking-tight">Good evening, ${store.user.name} 👋</h1>
            <p class="text-sm text-zinc-500 mt-1">Here's what's happening across your workspace</p>
          </div>
          <div class="flex items-center gap-2 bg-white/[0.05] border border-white/[0.07] rounded-2xl px-4 py-3 mb-6">
            <span class="text-xs text-zinc-500 font-medium mr-1 whitespace-nowrap">Live now</span>
            ${pills}
          </div>
          <div class="grid grid-cols-3 gap-3.5 mb-7">
            <div class="bg-white/[0.05] border border-white/[0.07] rounded-2xl p-5 hover:border-white/[0.12] transition-all">
              <p class="text-xs font-medium text-zinc-500 uppercase tracking-wide mb-2.5 flex items-center gap-1.5"><i class="fa-solid fa-users text-xs"></i>Live users</p>
              <p class="font-display text-3xl font-bold tracking-tight text-emerald-400">${store.presence.length}</p>
              <p class="text-xs text-zinc-600 mt-1.5">Active right now</p>
            </div>
            <div class="bg-white/[0.05] border border-white/[0.07] rounded-2xl p-5 hover:border-white/[0.12] transition-all">
              <p class="text-xs font-medium text-zinc-500 uppercase tracking-wide mb-2.5 flex items-center gap-1.5"><i class="fa-solid fa-folder text-xs"></i>Projects</p>
              <p class="font-display text-3xl font-bold tracking-tight text-violet-300">${store.tableData.length}</p>
              <p class="text-xs text-zinc-600 mt-1.5">Across all spaces</p>
            </div>
            <div class="bg-white/[0.05] border border-white/[0.07] rounded-2xl p-5 hover:border-white/[0.12] transition-all">
              <p class="text-xs font-medium text-zinc-500 uppercase tracking-wide mb-2.5 flex items-center gap-1.5"><i class="fa-solid fa-fire text-xs"></i>Streak</p>
              <p class="font-display text-3xl font-bold tracking-tight text-amber-400">13<span class="text-lg">d</span></p>
              <p class="text-xs text-zinc-600 mt-1.5">Keep it going 🔥</p>
            </div>
          </div>
          <div class="flex items-center justify-between mb-3.5">
            <h2 class="font-display text-sm font-semibold">Recent Activity</h2>
            <div class="flex items-center gap-1.5 text-xs font-semibold uppercase tracking-wide text-emerald-400 px-2.5 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse-dot inline-block"></span>Live
            </div>
          </div>
          <div class="flex flex-col gap-2">${items}</div>`;
      }

      function renderTable() {
        var rows = store.tableData
          .map(
            (p) => `
          <tr class="border-b border-white/[0.07] hover:bg-white/[0.05] transition-all ${p.lockedBy ? "opacity-75" : ""}" id="row-${p.id}">
            <td class="px-6 py-4 font-medium">${p.name}</td>
            <td class="px-6 py-4">${p.type}</td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-xs ${p.status === "live" ? "bg-emerald-500/10 text-emerald-400" : p.status === "in-progress" ? "bg-blue-500/10 text-blue-400" : "bg-amber-500/10 text-amber-400"}">${p.status}</span>
            </td>
            <td class="px-6 py-4">${p.progress}%</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-full bg-gradient-to-br from-violet-500 to-emerald-400 flex items-center justify-center text-xs font-bold text-white font-display">${p.lastEditedBy[0]}</div>
                <span>${p.lastEditedBy}</span>
                ${p.lockedBy ? `<span class="ml-2 text-amber-400 text-xs flex items-center gap-1"><i class="fa-solid fa-lock"></i> Locked by ${p.lockedBy}</span>` : ""}
              </div>
            </td>
            <td class="px-6 py-4 text-zinc-400">${p.date}</td>
            <td class="px-6 py-4">
              <button onclick="optimisticUpdate(${p.id})" 
                class="px-4 py-1 text-xs font-medium bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition">Update Progress</button>
            </td>
          </tr>`,
          )
          .join("");
        return `
          <div class="mb-7">
            <h1 class="font-display text-2xl font-bold tracking-tight">Advanced Data Table</h1>
            <p class="text-sm text-zinc-500 mt-1">Real-time sync • Optimistic updates • Row locking • Conflict merge</p>
          </div>
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-white/[0.07]">
                <th class="px-6 py-4 text-left">Project</th>
                <th class="px-6 py-4 text-left">Type</th>
                <th class="px-6 py-4 text-left">Status</th>
                <th class="px-6 py-4 text-left">Progress</th>
                <th class="px-6 py-4 text-left">Last Edited</th>
                <th class="px-6 py-4 text-left">Date</th>
                <th class="px-6 py-4 text-left">Actions</th>
              </tr>
            </thead>
            <tbody id="table-body">${rows}</tbody>
          </table>`;
      }

      function optimisticUpdate(id) {
        var row = store.tableData.find((r) => r.id === id);
        if (!row) return;
        row.progress = Math.min(
          100,
          row.progress + Math.floor(Math.random() * 15) + 5,
        );
        row.lastEditedBy = "You";
        render();
        showToast("Optimistically updated – syncing...");
        flashItem("row-" + id);
        setTimeout(() => {
          if (Math.random() > 0.7) {
            document.getElementById("merge-dialog").classList.remove("hidden");
            document.getElementById("merge-dialog").classList.add("flex");
          } else {
            showToast("Synced successfully");
          }
        }, 900);
      }

      function mergeConflict(choice) {
        document.getElementById("merge-dialog").classList.add("hidden");
        document.getElementById("merge-dialog").classList.remove("flex");
        showToast(
          choice === "merge"
            ? "Changes merged successfully"
            : "Your changes overrode the conflict",
        );
        render();
      }

      function showToast(msg) {
        var t = document.getElementById("toast");
        document.getElementById("toast-text").textContent = msg;
        t.classList.remove("toast-hide");
        t.classList.add("toast-show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => {
          t.classList.remove("toast-show");
          t.classList.add("toast-hide");
        }, 2800);
      }

      function flashItem(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.remove("flash");
        void el.offsetWidth;
        el.classList.add("flash");
      }

      function simulateLiveUpdates() {
        setInterval(() => {
          if (Math.random() > 0.5) {
            var idx = Math.floor(Math.random() * store.tableData.length);
            var p = store.tableData[idx];
            if (!p.lockedBy) {
              p.lockedBy =
                store.presence[
                  Math.floor(Math.random() * store.presence.length)
                ];
              setTimeout(() => {
                p.lockedBy = null;
                render();
              }, 4500);
              render();
            } else if (Math.random() > 0.7) {
              document
                .getElementById("merge-dialog")
                .classList.remove("hidden");
              document.getElementById("merge-dialog").classList.add("flex");
            }
          }
        }, 3200);
      }

      navigateTo("dashboard");
      simulateLiveUpdates();
    </script>
  </body>
</html>
