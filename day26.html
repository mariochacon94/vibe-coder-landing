<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 26 – Persistent SPA + Global State</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body class="bg-zinc-950 text-white font-sans min-h-screen">
    <!-- Back to Portfolio -->
    <a
      href="index.html"
      class="inline-flex items-center gap-2.5 px-5 py-2.5 mb-8 text-sm font-medium text-zinc-400 hover:text-white transition-all group mx-auto block w-fit"
    >
      <i
        class="fa-solid fa-arrow-left text-base transition-transform group-hover:-translate-x-0.5"
      ></i>
      <span>Back to Portfolio</span>
    </a>

    <div class="max-w-screen-2xl mx-auto flex h-screen">
      <!-- Sidebar -->
      <div class="w-72 bg-zinc-900 border-r border-white/10 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-12">
          <div
            class="w-9 h-9 bg-gradient-to-br from-blue-500 to-purple-500 rounded-2xl flex items-center justify-center"
          >
            📦
          </div>
          <h1 class="text-2xl font-bold">VibeStore</h1>
        </div>

        <nav class="flex-1 space-y-2">
          <button
            onclick="navigateTo('dashboard')"
            class="nav-btn w-full text-left px-6 py-4 rounded-3xl flex items-center gap-3 hover:bg-white/10 transition data-[active=true]:bg-white/10"
          >
            <i class="fa-solid fa-gauge-high"></i> Dashboard
          </button>
          <button
            onclick="navigateTo('projects')"
            class="nav-btn w-full text-left px-6 py-4 rounded-3xl flex items-center gap-3 hover:bg-white/10 transition data-[active=true]:bg-white/10"
          >
            <i class="fa-solid fa-folder"></i> Projects
          </button>
          <button
            onclick="navigateTo('analytics')"
            class="nav-btn w-full text-left px-6 py-4 rounded-3xl flex items-center gap-3 hover:bg-white/10 transition data-[active=true]:bg-white/10"
          >
            <i class="fa-solid fa-chart-simple"></i> Analytics
          </button>
          <button
            onclick="navigateTo('settings')"
            class="nav-btn w-full text-left px-6 py-4 rounded-3xl flex items-center gap-3 hover:bg-white/10 transition data-[active=true]:bg-white/10"
          >
            <i class="fa-solid fa-gear"></i> Settings
          </button>
        </nav>

        <div class="pt-8 border-t border-white/10">
          <button
            onclick="logout()"
            class="w-full flex items-center justify-center gap-3 py-4 text-red-400 hover:bg-white/10 rounded-3xl transition"
          >
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="flex-1 overflow-auto">
        <div class="p-10">
          <div id="page-content" class="min-h-full"></div>
        </div>
      </div>
    </div>

    <script>
      // ==================== GLOBAL STATE STORE ====================
      let store = JSON.parse(localStorage.getItem("vibeStore")) || {
        user: { name: "Mario", role: "admin" },
        theme: "dark",
        projects: [
          { id: 1, name: "Shine On Website", status: "live", progress: 100 },
          {
            id: 2,
            name: "Vibe Coder Portfolio",
            status: "in-progress",
            progress: 85,
          },
        ],
        lastUpdated: Date.now(),
      };

      function saveToLocalStorage() {
        localStorage.setItem("vibeStore", JSON.stringify(store));
      }

      function subscribe(callback) {
        window.vibeStoreSubscribers = window.vibeStoreSubscribers || [];
        window.vibeStoreSubscribers.push(callback);
      }

      function setStore(newState) {
        store = { ...store, ...newState };
        saveToLocalStorage();
        window.vibeStoreSubscribers?.forEach((cb) => cb(store));
      }

      // ==================== ROUTING ====================
      function navigateTo(page) {
        document
          .querySelectorAll(".nav-btn")
          .forEach((btn) => (btn.dataset.active = "false"));
        const activeBtn = Array.from(
          document.querySelectorAll(".nav-btn"),
        ).find((btn) => btn.getAttribute("onclick").includes(`'${page}'`));
        if (activeBtn) activeBtn.dataset.active = "true";

        const content = document.getElementById("page-content");
        let html = "";

        if (page === "dashboard") {
          html = `
          <h1 class="text-5xl font-bold mb-8">Welcome back, ${store.user.name} 👋</h1>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white/10 rounded-3xl p-8"><h3 class="text-xl">Projects Completed</h3><p class="text-6xl font-bold mt-4">${store.projects.length}</p></div>
            <div class="bg-white/10 rounded-3xl p-8"><h3 class="text-xl">Hours Today</h3><p class="text-6xl font-bold mt-4">6.5</p></div>
            <div class="bg-white/10 rounded-3xl p-8"><h3 class="text-xl">Streak</h3><p class="text-6xl font-bold mt-4">12 days 🔥</p></div>
          </div>
        `;
        } else if (page === "projects") {
          html = `<h1 class="text-4xl font-bold mb-8">Projects</h1>
          <div class="space-y-6">${store.projects
            .map(
              (p) => `
            <div class="bg-white/10 rounded-3xl p-8 flex justify-between items-center">
              <span class="text-xl">${p.name}</span>
              <span class="px-4 py-1 bg-emerald-400 text-zinc-900 rounded-3xl text-sm font-medium">${p.progress}%</span>
            </div>`,
            )
            .join("")}</div>`;
        } else if (page === "analytics") {
          html = `<h1 class="text-4xl font-bold mb-8">Analytics</h1><p class="text-zinc-400">Live chart coming in Day 27...</p>`;
        } else if (page === "settings") {
          html = `<h1 class="text-4xl font-bold mb-8">Settings</h1>
          <button onclick="toggleTheme()" class="px-8 py-4 bg-white text-zinc-900 rounded-3xl">Toggle Dark Mode</button>`;
        }

        content.innerHTML = html;
      }

      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
        setStore({
          theme: document.documentElement.classList.contains("dark")
            ? "dark"
            : "light",
        });
      }

      function logout() {
        if (confirm("End session?")) {
          localStorage.removeItem("vibeStore");
          window.location.reload();
        }
      }

      // Initialize
      window.onload = () => {
        navigateTo("dashboard");
        subscribe(() => navigateTo("dashboard")); // refresh current page on state change
      };
    </script>
  </body>
</html>
