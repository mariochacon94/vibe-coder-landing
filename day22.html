<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 22 – Drag & Drop Kanban Boards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body
    class="bg-white text-black dark:bg-zinc-950 dark:text-white font-sans min-h-screen"
  >
    <div class="max-w-screen-2xl mx-auto px-6 py-12">
      <h1
        class="text-5xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        Day 22: Drag & Drop Kanban Boards (Trello-Inspired)
      </h1>

      <div class="flex justify-between items-center mb-12">
        <a
          href="index.html"
          class="inline-flex items-center gap-2.5 px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white transition-all group"
        >
          <i
            class="fa-solid fa-arrow-left text-base transition-transform group-hover:-translate-x-0.5"
          ></i>
          <span>Back to Portfolio</span>
        </a>

        <button
          onclick="toggleTheme()"
          class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition"
        >
          <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
        </button>
      </div>

      <!-- Kanban Board -->
      <div
        class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto"
        id="kanban-board"
      >
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toast-container"
      class="fixed bottom-6 right-6 flex flex-col gap-3 z-[100]"
    ></div>

    <script>
      let tasks = [
        {
          id: 1,
          title: "Design new hero section",
          column: "todo",
          assignee: "Sarah",
        },
        {
          id: 2,
          title: "Implement authentication",
          column: "todo",
          assignee: "Mario",
        },
        {
          id: 3,
          title: "Create API endpoints",
          column: "inprogress",
          assignee: "Alex",
        },
        {
          id: 4,
          title: "Write documentation",
          column: "inprogress",
          assignee: "Maria",
        },
        {
          id: 5,
          title: "Launch marketing site",
          column: "done",
          assignee: "Sarah",
        },
        {
          id: 6,
          title: "Optimize performance",
          column: "todo",
          assignee: "Mario",
        },
      ];

      const columns = {
        todo: "To Do",
        inprogress: "In Progress",
        done: "Done",
      };

      function renderKanban() {
        const board = document.getElementById("kanban-board");
        board.innerHTML = "";

        Object.keys(columns).forEach((colKey) => {
          const columnTasks = tasks.filter((t) => t.column === colKey);

          let html = `
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-white/10 rounded-3xl p-6 min-h-[520px] transition-all"
               ondrop="drop(event, '${colKey}')" ondragover="allowDrop(event)">
            <div class="flex items-center justify-between mb-6">
              <h3 class="font-semibold text-lg">${columns[colKey]}</h3>
              <span class="bg-zinc-100 dark:bg-zinc-800 text-xs px-3 py-1 rounded-2xl">${columnTasks.length}</span>
            </div>
            <div class="space-y-4 min-h-[420px]" id="col-${colKey}">
        `;

          columnTasks.forEach((task) => {
            html += `
            <div class="task-card bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-white/10 rounded-2xl p-5 cursor-grab active:cursor-grabbing shadow-sm hover:shadow-md transition-all"
                 draggable="true" 
                 ondragstart="drag(event, ${task.id})"
                 data-id="${task.id}">
              <div class="font-medium mb-3">${task.title}</div>
              <div class="text-xs text-zinc-500">Assigned to ${task.assignee}</div>
            </div>`;
          });

          html += `</div></div>`;
          board.innerHTML += html;
        });
      }

      function allowDrop(ev) {
        ev.preventDefault();
        ev.currentTarget.classList.add(
          "ring-2",
          "ring-blue-500",
          "ring-offset-4",
        );
      }

      function drag(ev, id) {
        ev.dataTransfer.setData("text", id);
        // Add Trello-like tilt effect
        const card = document.querySelector(`[data-id="${id}"]`);
        if (card) card.style.transform = "rotate(4deg) scale(1.02)";
      }

      function drop(ev, targetColumn) {
        ev.preventDefault();
        const id = parseInt(ev.dataTransfer.getData("text"));
        const task = tasks.find((t) => t.id === id);

        // Remove highlight from all columns
        document
          .querySelectorAll(".task-card")
          .forEach((c) => (c.style.transform = ""));

        if (task && task.column !== targetColumn) {
          task.column = targetColumn;
          renderKanban();
          showToast("success", `Moved to ${columns[targetColumn]}`);
        }
      }

      function showToast(type, message) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `flex items-center gap-4 px-6 py-4 rounded-3xl shadow-2xl min-w-[320px] transform transition-all duration-300 translate-y-8 opacity-0 bg-emerald-600 text-white`;
        toast.innerHTML = `<i class="fa-solid fa-check-circle text-2xl"></i><span class="font-medium">${message}</span>`;
        container.appendChild(toast);

        setTimeout(
          () => toast.classList.remove("translate-y-8", "opacity-0"),
          10,
        );
        setTimeout(() => {
          toast.classList.add("translate-y-8", "opacity-0");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
      }

      window.onload = () => renderKanban();
    </script>
  </body>
</html>
