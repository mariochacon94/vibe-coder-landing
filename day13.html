<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 13 – Real API Integration & Data Fetching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body
    class="bg-white text-black dark:bg-zinc-950 dark:text-white font-sans min-h-screen"
  >
    <div class="max-w-screen-2xl mx-auto px-6 py-12">
      <h1
        class="text-5xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        Day 13: Real API Integration & Data Fetching
      </h1>

      <!-- Minimal Back Button -->
      <a
        href="index.html"
        class="inline-flex items-center gap-2.5 px-5 py-2.5 mb-12 text-sm font-medium text-zinc-400 hover:text-white transition-all group mx-auto block w-fit"
      >
        <i
          class="fa-solid fa-arrow-left text-base transition-transform group-hover:-translate-x-0.5"
        ></i>
        <span>Back to Portfolio</span>
      </a>

      <!-- 2.1 Live GitHub Repositories -->
      <section class="mb-24">
        <h2 class="text-3xl font-semibold mb-12 text-center">
          1. Live GitHub Repositories
        </h2>
        <div class="max-w-4xl mx-auto">
          <div class="flex justify-between items-center mb-8">
            <h3 class="text-2xl font-semibold">My Public Repositories</h3>
            <button
              onclick="fetchRepos()"
              class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-3xl text-white font-medium flex items-center gap-2 transition"
            >
              <i class="fa-solid fa-rotate"></i> Refresh
            </button>
          </div>

          <!-- Loading -->
          <div id="loading" class="hidden text-center py-12">
            <div
              class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"
            ></div>
            <p class="text-zinc-500 mt-4">Loading repositories...</p>
          </div>

          <!-- Error -->
          <div id="error" class="hidden text-center py-12 text-red-500">
            <p>Failed to load repositories. Please try again.</p>
          </div>

          <!-- Repos Grid -->
          <div
            id="repos-grid"
            class="grid grid-cols-1 md:grid-cols-2 gap-6"
          ></div>
        </div>
      </section>

      <!-- 2.2 Searchable & Filterable -->
      <section class="mb-24">
        <h2 class="text-3xl font-semibold mb-12 text-center">
          2. Searchable & Filterable Data
        </h2>
        <div class="max-w-4xl mx-auto">
          <input
            id="search-input"
            type="text"
            placeholder="Search repositories..."
            onkeyup="filterRepos()"
            class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-white/20 rounded-3xl px-6 py-5 focus:outline-none focus:border-blue-500 transition-all mb-8"
          />
          <div
            id="filtered-repos"
            class="grid grid-cols-1 md:grid-cols-2 gap-6"
          ></div>
        </div>
      </section>
    </div>

    <script>
      let allRepos = [];

      async function fetchRepos() {
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");
        const grid = document.getElementById("repos-grid");
        const filteredGrid = document.getElementById("filtered-repos");

        loading.classList.remove("hidden");
        error.classList.add("hidden");
        grid.innerHTML = "";
        filteredGrid.innerHTML = "";

        try {
          const response = await fetch(
            "https://api.github.com/users/mariochacon94/repos?sort=updated",
          );
          if (!response.ok) throw new Error("Failed");

          allRepos = await response.json();

          renderRepos(allRepos, grid);
          renderRepos(allRepos, filteredGrid);
        } catch (err) {
          error.classList.remove("hidden");
        } finally {
          loading.classList.add("hidden");
        }
      }

      function renderRepos(repos, container) {
        let html = "";
        repos.slice(0, 6).forEach((repo) => {
          html += `
          <a href="${repo.html_url}" target="_blank" class="block bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-white/10 rounded-3xl p-8 hover:border-blue-400 transition-all group">
            <h3 class="font-semibold text-lg group-hover:text-blue-400 transition">${repo.name}</h3>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-2 line-clamp-2">${repo.description || "No description"}</p>
            <div class="flex gap-4 mt-6 text-xs text-zinc-400">
              <span>⭐ ${repo.stargazers_count}</span>
              <span>🔀 ${repo.forks_count}</span>
            </div>
          </a>
        `;
        });
        container.innerHTML = html;
      }

      function filterRepos() {
        const query = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        const filtered = allRepos.filter(
          (repo) =>
            repo.name.toLowerCase().includes(query) ||
            (repo.description &&
              repo.description.toLowerCase().includes(query)),
        );
        renderRepos(filtered, document.getElementById("filtered-repos"));
      }

      // Load on start
      window.onload = fetchRepos;
    </script>
  </body>
</html>
